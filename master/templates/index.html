<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Pipeline Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="p-4">
    <h1>Pipeline Master</h1>

    <button id="start-btn" class="btn btn-success mb-4">▶️ Start Pipeline</button>

    <div id="accordion">
        {% for container in ["scraper", "chunker", "embedder"] %}
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#{{ container }}">
                    {{ container.capitalize() }}
                    <span class="badge bg-secondary ms-2" id="{{ container }}-status">unknown</span>
                </button>
            </h2>
            <div id="{{ container }}" class="accordion-collapse collapse">
                <div class="accordion-body">
                    <button class="btn btn-danger stop-btn" data-container="{{ container }}">⏹️ Stop</button>
                    <pre id="{{ container }}-stats">Loading stats...</pre>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="mt-4">
        <h5>Cron Schedule</h5>
        <input type="text" id="cron-input" class="form-control" placeholder="*/30 * * * *">
        <button id="cron-btn" class="btn btn-primary mt-2">Set Schedule</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
