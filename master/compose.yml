services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - askthws_net

# docker-compose excerpt
  postgres:
    image: postgres:17
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: scraperdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - askthws_net

  master:
    image: ghcr.io/dav354/master
    container_name: askTHWS-Master
    restart: always
    environment:
      POSTGRES_URL: postgres:5432
      QDRANT_URL: qdrant:6333
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: scraperdb
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - qdrant
    networks:
      - askthws_net

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - 5001:8080
    networks:
      - askthws_net

volumes:
  qdrant_data:
  pgdata:
  qdrant-model-cache:

networks:
  askthws_net:
